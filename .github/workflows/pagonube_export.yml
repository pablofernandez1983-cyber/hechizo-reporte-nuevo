name: PagoNube Export

on:
  # Corre todos los días a las 9am UTC (6am Argentina)
  schedule:
    - cron: '0 9 * * *'

  # Disparar manualmente desde GitHub: Actions → PagoNube Export → Run workflow
  workflow_dispatch:

jobs:
  export-pagonube:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install playwright boto3
          playwright install chromium
          playwright install-deps chromium

      - name: Run PagoNube export
        env:
          TN_STATE_JSON: ${{ secrets.TN_STATE_JSON }}
          AWS_S3_BUCKET_NAME: ${{ secrets.AWS_S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION }}
        run: |
          python pagonube_export.py
